<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HALO Live Tracker</title>
  
  <!-- Modern Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
    }

    body, html {
      height: 100%;
      background-color: #0b0c10;
      color: #ffffff;
      overflow: hidden;
    }

    #map {
      height: 100%;
      width: 100%;
      z-index: 1;
    }

    /* Dashboard Overlay (Bottom Card) */
    .overlay-panel {
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      margin: 0 auto;
      max-width: 320px;
      background: rgba(18, 19, 24, 0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 12px 16px;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.6);
      z-index: 1000;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      background-color: #ff3b30;
      border-radius: 50%;
      box-shadow: 0 0 8px #ff3b30;
      animation: pulse 1.5s infinite;
    }

    .brand h1 {
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 2px;
      color: #ffffff;
    }

    /* Status Badge */
    .status-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 8px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 10px;
      transition: all 0.3s ease;
    }

    .status-active {
      background: rgba(255, 59, 48, 0.1);
      color: #ff453a;
      border: 1.5px solid rgba(255, 59, 48, 0.2);
    }

    .status-safe {
      background: rgba(48, 209, 88, 0.1);
      color: #30d158;
      border: 1.5px solid rgba(48, 209, 88, 0.2);
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      padding: 8px 12px;
    }

    .stat-label {
      font-size: 8px;
      font-weight: 600;
      color: #8e8e93;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }

    .stat-value {
      font-size: 14px;
      font-weight: 800;
      color: #ffffff;
    }

    /* Controls */
    .btn-recenter {
      width: 100%;
      height: 38px;
      background: #007aff;
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      box-shadow: 0 4px 12px rgba(0, 122, 255, 0.2);
      transition: all 0.2s ease;
    }

    /* Compass / Flashlight Beam styling */
    .custom-latest-marker {
      background: none !important;
      border: none !important;
    }

    .pulsing-marker-wrapper {
      position: relative;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s ease-out;
    }

    .heading-cone {
      position: absolute;
      top: -30px;
      left: -15px;
      width: 50px;
      height: 30px;
      background: linear-gradient(to top, rgba(255, 69, 58, 0.45) 0%, rgba(255, 69, 58, 0.1) 60%, transparent 100%);
      clip-path: polygon(50% 0%, 15% 100%, 85% 100%);
      pointer-events: none;
      transform-origin: bottom center;
    }

    .btn-recenter:hover {
      background: #0062cc;
      box-shadow: 0 6px 20px rgba(0, 122, 255, 0.35);
      transform: translateY(-1px);
    }

    .btn-recenter:active {
      transform: translateY(1px);
    }

    /* Animations */
    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.5; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Custom Map Markers */
    .pulsing-marker {
      position: relative;
    }

    .pulsing-marker::after {
      content: '';
      position: absolute;
      width: 32px;
      height: 32px;
      top: -16px;
      left: -16px;
      border: 4px solid #ff3b30;
      border-radius: 50%;
      box-shadow: 0 0 15px #ff3b30;
      animation: markerPulse 1.5s ease-out infinite;
    }

    .pulsing-marker::before {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      top: -6px;
      left: -6px;
      background: #ff3b30;
      border: 2px solid #ffffff;
      border-radius: 50%;
      box-shadow: 0 0 5px rgba(0,0,0,0.5);
    }

    @keyframes markerPulse {
      0% { transform: scale(0.2); opacity: 0.8; }
      100% { transform: scale(1.2); opacity: 0; }
    }

    /* Custom Map Markers (Safe) */
    .pulsing-marker-safe {
      position: relative;
    }

    .pulsing-marker-safe::after {
      content: '';
      position: absolute;
      width: 32px;
      height: 32px;
      top: -16px;
      left: -16px;
      border: 4px solid #30d158;
      border-radius: 50%;
      box-shadow: 0 0 15px #30d158;
      animation: markerPulse 1.5s ease-out infinite;
    }

    .pulsing-marker-safe::before {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      top: -6px;
      left: -6px;
      background: #30d158;
      border: 2px solid #ffffff;
      border-radius: 50%;
      box-shadow: 0 0 5px rgba(0,0,0,0.5);
    }


    /* Leaflet Overrides (Hide Zoom) */
    .leaflet-control-zoom {
      display: none !important;
    }

    /* Attribution Custom Styling */
    .leaflet-container .leaflet-control-attribution {
      background: rgba(11, 12, 16, 0.8) !important;
      color: #8e8e93 !important;
    }

    /* Modal Banner for Safe wearer (Pulsing Green center card) */
    .safe-banner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2000;
      width: 85%;
      max-width: 380px;
      background: rgba(13, 20, 16, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 2px solid #30d158;
      border-radius: 36px;
      padding: 40px 24px;
      text-align: center;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
      display: none;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translate(-50%, -45%); }
      to { opacity: 1; transform: translate(-50%, -50%); }
    }

    .safe-banner h2 {
      font-size: 32px;
      font-weight: 800;
      color: #30d158;
      margin-bottom: 12px;
      letter-spacing: 1px;
    }

    .safe-banner p {
      color: #a0aec0;
      font-size: 16px;
      line-height: 1.4;
    }

    /* Floating Map Layer Switcher Button */
    .layer-toggle {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 1000;
      background: rgba(30, 30, 35, 0.7);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 10px 16px;
      color: #ffffff;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      transition: all 0.2s ease-out;
    }
    
    .layer-toggle:hover {
      background: rgba(50, 50, 55, 0.85);
      border-color: rgba(255, 255, 255, 0.25);
      transform: translateY(-1px);
    }
    
    .layer-toggle:active {
      transform: translateY(1px);
    }

    @media (max-width: 480px) {
      .overlay-panel {
        left: 15px;
        right: 15px;
        bottom: 15px;
      }
    }
  </style>
</head>
<body>

  <!-- Map element -->
  <div id="map"></div>

  <!-- Map layer toggle button -->
  <button class="layer-toggle" id="layerToggle" onclick="toggleMapLayer()">
    🛰️ Satellite View
  </button>

  <!-- Dashboard Panel -->
  <div class="overlay-panel">
    <div class="brand">
      <div class="logo-dot" id="logoDot"></div>
      <h1>HALO LIVE</h1>
    </div>
    
    <div class="status-badge status-active" id="statusBadge">
      Active Emergency
    </div>
    
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Breadcrumbs</div>
        <div class="stat-value" id="breadcrumbCount">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Last Ping</div>
        <div class="stat-value" id="lastPing">--:--:--</div>
      </div>
    </div>
    
    <button class="btn-recenter" onclick="recenterMap()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line></svg>
      Recenter Device
    </button>
  </div>

  <!-- Safe Modal Banner -->
  <div class="safe-banner" id="safeBanner">
    <h2>WEARER IS SAFE</h2>
    <p>The emergency alert has been resolved by the device owner.</p>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  
  <!-- Firebase Compat SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <script>
    // 1. Firebase Configuration
    const firebaseConfig = {
    apiKey: "__FIREBASE_API_KEY__",
    authDomain: "halo-safety.firebaseapp.com",
    databaseURL: "https://halo-safety-default-rtdb.firebaseio.com",
    projectId: "halo-safety",
    storageBucket: "halo-safety.firebasestorage.app",
    messagingSenderId: "__FIREBASE_MESSAGING_SENDER_ID__",
    appId: "__FIREBASE_APP_ID__"
};

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Get device ID from URL params (defaults to 'sos_device')
    const urlParams = new URLSearchParams(window.location.search);
    const deviceId = urlParams.get('device') || 'sos_device';

    // 2. Initialize Leaflet Map
    const map = L.map('map', {
      zoomControl: true,
      zoomAnimation: true
    }).setView([10.0104, 76.3608], 13); // Default view coordinate

    // Map Layers Definition
    const darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 20
    });

    const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community',
      maxZoom: 19
    });

    // Add Dark Layer as default
    darkLayer.addTo(map);

    // Map layer toggle handler
    let isSatellite = false;
    function toggleMapLayer() {
      const toggleBtn = document.getElementById('layerToggle');
      if (isSatellite) {
        map.removeLayer(satelliteLayer);
        darkLayer.addTo(map);
        toggleBtn.innerHTML = '🛰️ Satellite View';
        isSatellite = false;
      } else {
        map.removeLayer(darkLayer);
        satelliteLayer.addTo(map);
        toggleBtn.innerHTML = '🌑 Dark Map';
        isSatellite = true;
      }
    }

    // Live variables
    let breadcrumbs = []; // Array of L.LatLng
    let breadcrumbMarkers = []; // Leaflet marker group
    let pathPolyline = null; // The trail line
    let latestMarker = null; // Pulsing marker
    let wasActive = false; // Track if SOS session was active in current load

    // Pulsing Marker Icon (Active)
    const pulsingIconActive = L.divIcon({
      className: 'pulsing-marker',
      iconSize: [20, 20]
    });

    // Pulsing Marker Icon (Safe)
    const pulsingIconSafe = L.divIcon({
      className: 'pulsing-marker-safe',
      iconSize: [20, 20]
    });

    let isFirstLoad = true; // Control map centering on initial load


    // Custom circle breadcrumb icon
    const createBreadcrumbIcon = (index, total) => {
      // Calculate opacity (newest dots are more opaque, older dots fade out)
      const opacity = 0.2 + (index / total) * 0.8;
      return L.divIcon({
        html: `<div style="width: 8px; height: 8px; background-color: #ff3b30; border-radius: 50%; opacity: ${opacity}; border: 1.5px solid #ffffff; box-shadow: 0 0 4px rgba(0,0,0,0.5);"></div>`,
        className: 'breadcrumb-marker',
        iconSize: [8, 8],
        iconAnchor: [4, 4]
      });
    };

    // Recenter map bounds to fit the whole breadcrumb trail
    function recenterMap() {
      if (breadcrumbs.length > 0) {
        const bounds = L.latLngBounds(breadcrumbs);
        map.fitBounds(bounds, { padding: [50, 50], maxZoom: 16 });
      }
    }

    // 3. Connect to Firebase Realtime Database
    const deviceRef = database.ref(`active_incidents/${deviceId}`);

    deviceRef.on('value', (snapshot) => {
      const data = snapshot.val();
      if (!data) return;

      const isActive = data.is_active;
      const history = data.history;

      // Update UI Status Badge
      const statusBadge = document.getElementById('statusBadge');
      const logoDot = document.getElementById('logoDot');
      const safeBanner = document.getElementById('safeBanner');

      if (isActive) {
        statusBadge.textContent = 'Active Emergency';
        statusBadge.className = 'status-badge status-active';
        logoDot.style.backgroundColor = '#ff3b30';
        logoDot.style.boxShadow = '0 0 10px #ff3b30';
        safeBanner.style.display = 'none';
        wasActive = true; // Mark as active so transition can trigger safe banner later

        // Show the map and dashboard panel
        document.getElementById('map').style.display = 'block';
        document.querySelector('.overlay-panel').style.display = 'block';
        document.getElementById('layerToggle').style.display = 'flex';
        map.invalidateSize();
      } else {
        statusBadge.textContent = 'Safe / Resolved';
        statusBadge.className = 'status-badge status-safe';
        logoDot.style.backgroundColor = '#30d158';
        logoDot.style.boxShadow = '0 0 10px #30d158';

        // Clear all markers and lines from the map so the location is hidden!
        if (pathPolyline) {
          map.removeLayer(pathPolyline);
          pathPolyline = null;
        }
        breadcrumbMarkers.forEach(m => map.removeLayer(m));
        breadcrumbMarkers = [];
        breadcrumbs = [];
        if (latestMarker) {
          map.removeLayer(latestMarker);
          latestMarker = null;
        }

        // Hide the map and dashboard overlay panel entirely
        document.getElementById('map').style.display = 'none';
        document.querySelector('.overlay-panel').style.display = 'none';
        document.getElementById('layerToggle').style.display = 'none';

        // Display the safe banner or no-tracking placeholder
        if (wasActive) {
          safeBanner.innerHTML = '<h2>WEARER IS SAFE</h2><p>The emergency alert has been resolved by the device owner.</p>';
          safeBanner.style.display = 'block';
        } else {
          safeBanner.innerHTML = '<h2>NO ACTIVE TRACKING</h2><p>There is currently no active emergency tracking session for this device.</p>';
          safeBanner.style.display = 'block';
        }
        return; // Exit early to prevent drawing location markers or trails when safe/inactive
      }

      // 1. Draw/Update the Latest Marker from main lat/lng
      if (data.lat && data.lng) {
        const latestLatLng = L.latLng(data.lat, data.lng);
        const heading = data.heading || 0;

        // Dynamic Icon with compass rotation when active
        const currentIcon = isActive 
          ? L.divIcon({
              html: `
                <div class="pulsing-marker-wrapper" style="transform: rotate(${heading}deg);">
                  <div class="pulsing-marker"></div>
                  <div class="heading-cone"></div>
                </div>
              `,
              className: 'custom-latest-marker',
              iconSize: [20, 20],
              iconAnchor: [10, 10]
            })
          : pulsingIconSafe;

        if (latestMarker) {
          latestMarker.setLatLng(latestLatLng);
          latestMarker.setIcon(currentIcon);
        } else {
          latestMarker = L.marker(latestLatLng, { icon: currentIcon }).addTo(map);
        }

        // Update Last Ping in UI
        const latestTs = data.timestamp;
        if (latestTs) {
          const timeString = new Date(latestTs).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
          document.getElementById('lastPing').textContent = timeString;
        }

        // Trigger Map fit/recenter on first load
        if (isFirstLoad) {
          map.setView(latestLatLng, 17);
          isFirstLoad = false;
        }
      }

      // 2. Process Breadcrumbs History
      if (history) {
        // Clear previous path layer
        if (pathPolyline) map.removeLayer(pathPolyline);
        
        // Remove old breadcrumb markers
        breadcrumbMarkers.forEach(m => map.removeLayer(m));
        breadcrumbMarkers = [];

        // Parse history keys to order coordinates by timestamp chronologically
        const sortedKeys = Object.keys(history).sort((a, b) => history[a].timestamp - history[b].timestamp);
        breadcrumbs = sortedKeys.map(key => L.latLng(history[key].lat, history[key].lng));

        // Draw Polyline (The trail)
        pathPolyline = L.polyline(breadcrumbs, {
          color: '#ff3b30',
          weight: 4,
          opacity: 0.65,
          lineJoin: 'round',
          dashArray: '8, 8' // Dashed trail look
        }).addTo(map);

        // Draw breadcrumb dots
        const totalPoints = breadcrumbs.length;
        breadcrumbs.forEach((latlng, idx) => {
          // Draw standard dot marker (exclude the very last current location)
          if (idx < totalPoints - 1) {
            const m = L.marker(latlng, { icon: createBreadcrumbIcon(idx, totalPoints) }).addTo(map);
            breadcrumbMarkers.push(m);
          }
        });

        // Update Stats
        document.getElementById('breadcrumbCount').textContent = totalPoints;
      } else {
        // Clear history trail if history is empty/null
        if (pathPolyline) {
          map.removeLayer(pathPolyline);
          pathPolyline = null;
        }
        breadcrumbMarkers.forEach(m => map.removeLayer(m));
        breadcrumbMarkers = [];
        breadcrumbs = [];
        document.getElementById('breadcrumbCount').textContent = '0';
      }
    });

  </script>
</body>
</html>
