name: halo_app
description: "A professional SOS safety application with ESP32 integration."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI and Icons
  cupertino_icons: ^1.0.8

  # Core Backend (Firebase)
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0

  # Hardware and Communication
  # Use another_telephony for direct background SMS sending
  another_telephony: ^0.4.1
  
  # Bluetooth for ESP32 Connection
  flutter_blue_plus: ^1.36.0

  # Location and Maps
  geolocator: ^12.0.0
  url_launcher: ^6.3.0

  # Local Storage
  shared_preferences: ^2.3.0
  firebase_database: ^11.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # If you have custom assets/fonts, uncomment these:
  # assets:
  #   - assets/images/